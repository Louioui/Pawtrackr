name: Pawtrackr CI

on:
  push:
    branches: [ "Master", "main" ]
  pull_request:
    branches: [ "Master", "main" ]

jobs:
  test:
    name: Build and Test
    runs-on: macos-latest
    # Hard cap so a hung/slow test can't burn a 6-hour runner.
    timeout-minutes: 20

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        # Use the runner image's latest stable Xcode. Pinning a specific version
        # (e.g. 16.0) is brittle: GitHub prunes older iOS Simulator runtimes from
        # the image, which is what broke this job (iOS 18.0 was no longer
        # installed under Xcode 16.0).
        xcode-version: latest-stable

    - name: Select iOS Simulator
      id: sim
      run: |
        set -euo pipefail
        echo "Using: $(xcodebuild -version | tr '\n' ' ')"
        # Don't hardcode the iOS version — pick the newest available iPhone
        # simulator on whatever runtime the runner currently ships. Compare by
        # numeric components (so iOS-18-10 > iOS-18-6, not lexicographically).
        DEST_ID=$(xcrun simctl list devices available --json | /usr/bin/python3 -c '
        import json, re, sys
        devices = json.load(sys.stdin).get("devices", {})
        def nums(s): return [int(n) for n in re.findall(r"\d+", s)]
        best = None
        for runtime, devs in devices.items():
            if "iOS" not in runtime:
                continue
            for d in devs:
                name = d.get("name", "")
                if d.get("isAvailable") and name.startswith("iPhone"):
                    key = (nums(runtime), nums(name), runtime, name)
                    if best is None or key > best[0]:
                        best = (key, d["udid"])
        print(best[1] if best else "")
        ')
        if [ -z "$DEST_ID" ]; then
          echo "::error::No available iOS Simulator found on the runner."
          xcrun simctl list devices
          exit 1
        fi
        # Defense-in-depth: only emit a value that is strictly a UUID, so a
        # malformed/unexpected string can't be smuggled into later expansion.
        if ! printf '%s' "$DEST_ID" | grep -qiE '^[0-9A-F]{8}-([0-9A-F]{4}-){3}[0-9A-F]{12}$'; then
          echo "::error::Unexpected simulator UDID format: $DEST_ID"
          exit 1
        fi
        echo "Selected simulator UDID: $DEST_ID"
        echo "dest_id=$DEST_ID" >> "$GITHUB_OUTPUT"

    - name: Build and Test
      # Pass the UDID through the environment instead of interpolating
      # ${{ ... }} directly into the script, so the value can never be treated
      # as part of the shell command (avoids the template-injection class).
      env:
        DEST_ID: ${{ steps.sim.outputs.dest_id }}
      run: |
        set -euo pipefail
        # Run the unit-test target only. The UI tests (PawtrackrUITests) drive the
        # app through PIN/onboarding/sync gates and are slow/flaky in a headless
        # CI simulator (they hang for 30+ min there), so they aren't part of the
        # required check — run them locally, or add a dedicated UI-test workflow.
        xcodebuild test \
          -project Pawtrackr.xcodeproj \
          -scheme Pawtrackr \
          -destination "id=$DEST_ID" \
          -only-testing:PawtrackrTests \
          -parallel-testing-enabled YES \
          -resultBundlePath TestResults.xcresult \
          CODE_SIGNING_ALLOWED=NO
